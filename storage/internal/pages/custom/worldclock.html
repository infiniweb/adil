<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock Manager</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Using Luxon for robust Timezone support -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    
    <style>
        :root {
            --background: 225 6% 7%;
            --foreground: 0 0% 85%;
            --card: 0 0% 9%;
            --primary: 160 52% 45%;
            --accent: 160 52% 45%;
            --accent-foreground: 0 0% 98%;
            --border: 225 6% 20%;
            --muted-foreground: 225 5% 55%;
            --secondary: 0 0% 12%;
            --destructive: 0 60% 50%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            padding: 40px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .page-container { max-width: 1200px; margin: 0 auto; }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .page-title {
            font-size: 32px;
            color: hsl(var(--accent));
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .header-controls { display: flex; gap: 12px; align-items: center; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .card {
            background: hsl(var(--card));
            border: 2px solid hsl(var(--border));
            padding: 24px;
            transition: border-color 0.2s ease;
            position: relative;
        }

        .card:hover { border-color: hsl(var(--accent)); }

        .card-header { display: flex; gap: 10px; margin-bottom: 20px; }

        .tz-input {
            flex-grow: 1;
            background: hsl(var(--secondary));
            color: hsl(var(--foreground));
            border: 1px solid hsl(var(--border));
            font-family: inherit;
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        .tz-input:focus { border-color: hsl(var(--accent)); }

        .time-display {
            font-size: 42px;
            font-weight: 700;
            color: hsl(var(--accent));
            line-height: 1;
            margin-bottom: 15px;
            white-space: nowrap;
        }

        .stats-row {
            font-size: 13px;
            color: hsl(var(--muted-foreground));
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-top: 1px solid hsl(var(--border));
            padding-top: 15px;
        }

        .stats-row b { color: hsl(var(--foreground)); }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            padding: 8px 15px;
            font-size: 13px;
        }

        .btn-remove {
            background: hsl(var(--border));
            color: hsl(var(--foreground));
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 18px; flex-shrink: 0;
        }

        .btn-remove:hover { background: hsl(var(--destructive)); color: white; }

        @media (max-width: 768px) {
            body { padding: 20px; }
            .header-flex { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="header-flex">
            <h1 class="page-title">World Clocks</h1>
            <div class="header-controls">
                <button class="btn btn-outline" onclick="toggleFormat()" id="format-toggle">24H</button>
                <button class="btn" onclick="addClock()">+ Add Clock</button>
            </div>
        </div>
        <div id="clocks-container" class="cards-grid"></div>
    </div>

    <datalist id="tz-list"></datalist>

    <script>
        const DateTime = luxon.DateTime;

        const TZ_ABBREVIATIONS = {
            'AST': 'America/Halifax',
            'ADT': 'America/Halifax',
            'EST': 'America/New_York', 
            'EDT': 'America/New_York',
            'CST': 'America/Chicago', 
            'CDT': 'America/Chicago',
            'MST': 'America/Denver', 
            'MDT': 'America/Denver',
            'PST': 'America/Los_Angeles', 
            'PDT': 'America/Los_Angeles',
            'AEST': 'Australia/Sydney', 
            'AEDT': 'Australia/Sydney',
            'BST': 'Europe/London', 
            'IST': 'Asia/Kolkata',
            'JST': 'Asia/Tokyo', 
            'KST': 'Asia/Seoul',
            'CET': 'Europe/Paris', 
            'CEST': 'Europe/Paris',
            'HKT': 'Asia/Hong_Kong', 
            'SGT': 'Asia/Singapore',
            'HST': 'Pacific/Honolulu', 
            'AKST': 'America/Anchorage',
            'WET': 'Europe/Lisbon',
            'MSK': 'Europe/Moscow'
        };

        let clocks = JSON.parse(localStorage.getItem('world-clocks')) || ['local', 'UTC', 'America/New_York', 'Asia/Tokyo'];
        let is24Hour = localStorage.getItem('clock-format') !== '12h';

        // Populate Datalist with all valid IANA zones
        const datalist = document.getElementById('tz-list');
        Intl.supportedValuesOf('timeZone').forEach(tz => {
            const opt = document.createElement('option');
            opt.value = tz;
            datalist.appendChild(opt);
        });

        function toggleFormat() {
            is24Hour = !is24Hour;
            localStorage.setItem('clock-format', is24Hour ? '24h' : '12h');
            updateDisplay();
        }

        function addClock() {
            clocks.push('UTC');
            save();
            render();
        }

        function removeClock(index) {
            clocks.splice(index, 1);
            save();
            render();
        }

        function updateClockTimezone(index, val) {
            clocks[index] = val;
            save();
            updateDisplay();
        }

        function save() {
            localStorage.setItem('world-clocks', JSON.stringify(clocks));
        }

        /**
         * Resolves a string input to a Luxon DateTime object
         */
        function getLuxonTime(input) {
            const cleanInput = input.trim();
            const upperInput = cleanInput.toUpperCase();
            
            // 1. Check for 'local' keyword
            if (upperInput === 'LOCAL') return DateTime.now();

            // 2. Check manual abbreviation map
            if (TZ_ABBREVIATIONS[upperInput]) {
                return DateTime.now().setZone(TZ_ABBREVIATIONS[upperInput]);
            }

            // 3. Check for Offset (e.g., UTC+5, -8, +05:30)
            const offsetMatch = cleanInput.match(/^(?:UTC|GMT)?([+-]\d{1,2}:?\d{0,2})$/i);
            if (offsetMatch) {
                return DateTime.now().setZone(`UTC${offsetMatch[1]}`);
            }

            // 4. Try as IANA name (e.g., Africa/Cairo)
            const dt = DateTime.now().setZone(cleanInput);
            if (dt.isValid) return dt;

            return null;
        }

        function getOffsetInfo(input) {
            const target = getLuxonTime(input);
            if (!target || !target.isValid) {
                return { timeStr: "Invalid TZ", utcText: "---", diffText: "---", label: "Unknown" };
            }

            const local = DateTime.now();
            
            // Format time
            const timeStr = target.toFormat(is24Hour ? 'HH:mm:ss' : 'hh:mm:ss a');
            
            // Get Offset from UTC (e.g., UTC +5.5)
            const offsetHours = target.offset / 60;
            const utcText = `UTC ${offsetHours >= 0 ? '+' : ''}${offsetHours}`;

            // Calculate Difference from local system time
            const diffInHours = (target.offset - local.offset) / 60;
            let diffText = "";
            if (diffInHours === 0) {
                diffText = "Same as local";
            } else {
                const absDiff = Math.abs(diffInHours);
                diffText = `${absDiff}h ${diffInHours > 0 ? 'ahead of' : 'behind'} local`;
            }

            return { 
                timeStr, 
                utcText, 
                diffText, 
                label: target.zoneName === 'local' ? 'Local System' : target.offsetNameLong 
            };
        }

        function render() {
            const container = document.getElementById('clocks-container');
            document.getElementById('format-toggle').textContent = is24Hour ? '24H' : '12H';
            
            container.innerHTML = clocks.map((currentTz, index) => `
                <div class="card">
                    <div class="card-header">
                        <input type="text" 
                               class="tz-input" 
                               list="tz-list" 
                               value="${currentTz}" 
                               placeholder="Enter Zone (e.g. PST, UTC+7, Europe/London)"
                               oninput="updateClockTimezone(${index}, this.value)">
                        <button class="btn-remove" onclick="removeClock(${index})">✕</button>
                    </div>
                    <div class="time-display" id="time-${index}">--:--:--</div>
                    <div class="stats-row">
                        <span>Zone: <b id="label-${index}">---</b></span>
                        <span>Offset: <b id="utc-${index}">---</b></span>
                        <span>Relative: <b id="diff-${index}">---</b></span>
                    </div>
                </div>
            `).join('');
            updateDisplay();
        }

        function updateDisplay() {
            clocks.forEach((tz, index) => {
                const data = getOffsetInfo(tz);
                const t = document.getElementById(`time-${index}`);
                const u = document.getElementById(`utc-${index}`);
                const d = document.getElementById(`diff-${index}`);
                const l = document.getElementById(`label-${index}`);
                
                if (t) t.textContent = data.timeStr;
                if (u) u.textContent = data.utcText;
                if (d) d.textContent = data.diffText;
                if (l) l.textContent = data.label;
            });
        }

        setInterval(updateDisplay, 1000);
        render();

    </script>
</body>
</html>
