<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="storage/internal/styles/page-styles.css">
    <script src="storage/internal/scripts/embed-detect.js"></script>
    <script src="storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <style>
        .preview-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: hsl(var(--accent));
        }
        .preview-date {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 1rem;
        }
        .preview-excerpt {
            line-height: 1.5;
            font-size: 0.9rem;
        }
        .social-card.discord-status {
            border-color: #5865F2;
            color: #5865F2;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">Welcome</h1>
        
        <div id="about-me" class="section">
            <h2>About Me</h2>
            <div class="card bio-card">Loading bio...</div>
        </div>
        
        <div id="socials" class="section">
            <h2>Socials</h2>
            <div class="socials-grid"></div>
        </div>
        
        <div id="skills" class="section">
            <h2>Skills</h2>
            <div class="skills-grid"></div>
        </div>
    </div>
    
    <script>
        async function fetchDiscordData(userId) {
            try {
                const [bioRes, statusRes] = await Promise.all([
                    fetch(`https://dcdn.dstn.to/profile/${userId}?t=${Date.now()}`),
                    fetch(`https://api.lanyard.rest/v1/users/${userId}`)
                ]);

                const bioData = await bioRes.json();
                const statusData = await statusRes.json();

                let bio = "This user has no bio set on Discord.";
                if (bioData.user_profile && bioData.user_profile.bio) {
                    bio = bioData.user_profile.bio;
                } else if (bioData.user && bioData.user.bio) {
                    bio = bioData.user.bio;
                }

                const statusMap = {
                    'online': 'Online',
                    'dnd': 'DND',
                    'idle': 'Idle',
                    'offline': 'Offline'
                };
                const rawStatus = statusData.data?.discord_status || 'offline';
                const statusText = statusMap[rawStatus] || 'Offline';

                return { bio, statusText };
            } catch (error) {
                console.error('Discord API Error:', error);
                try {
                    const fallback = await fetch(`https://discordlookup.mesalytic.moe/v1/user/${userId}`);
                    const fbData = await fallback.json();
                    return { bio: fbData.bio || "Bio unavailable.", statusText: "Offline" };
                } catch (e) {
                    return { bio: "Bio currently unavailable.", statusText: "Offline" };
                }
            }
        }

        async function refreshDiscordUI() {
            const DISCORD_ID = '974512844924145695';
            const bioCard = document.querySelector('.bio-card');
            const socialsGrid = document.querySelector('.socials-grid');
            
            const data = await fetchDiscordData(DISCORD_ID);
            
            if (bioCard) {
                bioCard.innerHTML = marked.parse(data.bio);
            }

            let discordCard = document.getElementById('discord-live-card');
            if (!discordCard) {
                discordCard = document.createElement('a');
                discordCard.id = 'discord-live-card';
                discordCard.className = 'social-card discord-status';
                discordCard.href = `https://discord.com/users/${DISCORD_ID}/`;
                discordCard.target = '_blank';
                socialsGrid.prepend(discordCard);
            }
            discordCard.textContent = `Discord | ${data.statusText}`;
            
            console.log("Discord UI Refreshed:", new Date().toLocaleTimeString());
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await refreshDiscordUI();

            setInterval(refreshDiscordUI, 600000);

            try {
                const response = await fetch('storage/data/home.yaml');
                const text = await response.text();
                const yamlData = jsyaml.load(text);
                const homeData = yamlData.home;

                if (homeData.socials) {
                    const socialsGrid = document.querySelector('.socials-grid');
                    homeData.socials.forEach(social => {
                        if (social.name.toLowerCase() !== 'discord') {
                            const card = document.createElement('a');
                            card.className = 'social-card';
                            card.href = social.link;
                            card.target = '_blank';
                            card.textContent = social.name;
                            socialsGrid.appendChild(card);
                        }
                    });
                }

                if (homeData.skills) {
                    const skillsGrid = document.querySelector('.skills-grid');
                    homeData.skills.forEach(item => {
                        const text = typeof item === 'string' ? item : item.skill;
                        const link = typeof item === 'object' ? item.link : null;
                        const card = link ? document.createElement('a') : document.createElement('div');
                        card.className = link ? 'skill-card skill-card-link' : 'skill-card';
                        if (link) { card.href = link; card.target = '_blank'; }
                        card.textContent = text;
                        skillsGrid.appendChild(card);
                    });
                }
            } catch (e) {
                console.warn("YAML data failed to load.");
            }
        });
    </script>
</body>
</html>
